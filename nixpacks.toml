providers = ["php", "node"]

[variables]
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.setup]
nixPkgs = ["php84", "php84Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
    "npm install",
    "composer install --no-dev --no-interaction --optimize-autoloader"
]

[phases.build]
cmds = [
    "npm run build"
]
